
<!DOCTYPE html>
<html>
<head>
    <style>
        .tileset-container { margin-bottom: 40px; }
        .tile-grid { 
            display: grid; 
            grid-template-columns: repeat(8, 32px); 
            gap: 1px; 
            background: #ccc; 
            width: fit-content;
        }
        .tile { 
            width: 32px; 
            height: 32px; 
            background-size: 256px auto; 
            position: relative;
            background-color: #fff;
        }
        .tile:hover::after {
            content: attr(data-id);
            position: absolute;
            top: 0; left: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            padding: 2px;
            z-index: 10;
        }
    </style>
</head>
